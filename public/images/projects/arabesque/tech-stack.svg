<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" width="1600" height="1100" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <style>
      .bg { fill: #f9f9f7; }
      .ink { fill: #0A0A0A; }
      .muted { fill: rgba(10,10,10,0.55); }
      .accent { fill: #98D5D8; }
      .accent-soft { fill: #E8F4F4; }
      .rule { stroke: rgba(10,10,10,0.12); stroke-width: 1; fill: none; }
      .rule-thick { stroke: rgba(10,10,10,0.55); stroke-width: 2; fill: none; }
      .title { font-family: Georgia, serif; font-size: 56px; font-weight: 400; letter-spacing: -0.01em; }
      .subtitle { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 15px; letter-spacing: 0.22em; text-transform: uppercase; }
      .col-label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 13px; letter-spacing: 0.22em; text-transform: uppercase; font-weight: 600; }
      .stack-name { font-family: Georgia, serif; font-size: 28px; font-weight: 700; letter-spacing: 0.01em; }
      .stack-role { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 16px; line-height: 1.5; }
      .num { font-family: Georgia, serif; font-size: 64px; font-weight: 400; font-style: italic; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1100" />

  <text class="subtitle muted" x="80" y="74">Tools &amp; Libraries</text>
  <text class="title ink" x="80" y="138">A full-stack pattern atelier.</text>
  <line x1="80" y1="172" x2="320" y2="172" class="rule-thick" />

  <!-- Three columns: Backend / Frontend / Interactive -->

  <!-- COLUMN 1: Backend -->
  <g transform="translate(80, 240)">
    <text class="num accent" x="0" y="0">01</text>
    <text class="col-label muted" x="0" y="60">Backend &amp; Data</text>
    <line x1="0" y1="80" x2="120" y2="80" class="rule-thick" />

    <g transform="translate(0, 130)">
      <text class="stack-name ink" x="0" y="0">PHP</text>
      <text class="stack-role muted" x="0" y="30">Server-side language.</text>
      <text class="stack-role muted" x="0" y="50">Routes, sessions, hashing.</text>
    </g>

    <g transform="translate(0, 250)">
      <text class="stack-name ink" x="0" y="0">Fat-Free Framework</text>
      <text class="stack-role muted" x="0" y="30">Lightweight PHP routing,</text>
      <text class="stack-role muted" x="0" y="50">templating &amp; ORM.</text>
    </g>

    <g transform="translate(0, 370)">
      <text class="stack-name ink" x="0" y="0">MySQL</text>
      <text class="stack-role muted" x="0" y="30">Five-table relational schema:</text>
      <text class="stack-role muted" x="0" y="50">patterns · users · locations</text>
      <text class="stack-role muted" x="0" y="70">likes · edit_requests.</text>
    </g>

    <g transform="translate(0, 520)">
      <text class="stack-name ink" x="0" y="0">PHPStorm</text>
      <text class="stack-role muted" x="0" y="30">Editor of choice for the</text>
      <text class="stack-role muted" x="0" y="50">whole project.</text>
    </g>
  </g>

  <!-- COLUMN 2: Frontend -->
  <g transform="translate(580, 240)">
    <text class="num accent" x="0" y="0">02</text>
    <text class="col-label muted" x="0" y="60">Frontend &amp; Layout</text>
    <line x1="0" y1="80" x2="120" y2="80" class="rule-thick" />

    <g transform="translate(0, 130)">
      <text class="stack-name ink" x="0" y="0">HTML5 / CSS3</text>
      <text class="stack-role muted" x="0" y="30">Semantic markup, fluid type,</text>
      <text class="stack-role muted" x="0" y="50">responsive grids.</text>
    </g>

    <g transform="translate(0, 250)">
      <text class="stack-name ink" x="0" y="0">JavaScript</text>
      <text class="stack-role muted" x="0" y="30">Vanilla JS + AJAX for</text>
      <text class="stack-role muted" x="0" y="50">async pattern loading and</text>
      <text class="stack-role muted" x="0" y="70">interactive UI.</text>
    </g>

    <g transform="translate(0, 400)">
      <text class="stack-name ink" x="0" y="0">Bootstrap</text>
      <text class="stack-role muted" x="0" y="30">Front-end framework for</text>
      <text class="stack-role muted" x="0" y="50">page layouts and components.</text>
    </g>

    <g transform="translate(0, 520)">
      <text class="stack-name ink" x="0" y="0">Lora + Arial</text>
      <text class="stack-role muted" x="0" y="30">Serif headings, sans body —</text>
      <text class="stack-role muted" x="0" y="50">brand voice + browser default.</text>
    </g>
  </g>

  <!-- COLUMN 3: Interactive -->
  <g transform="translate(1080, 240)">
    <text class="num accent" x="0" y="0">03</text>
    <text class="col-label muted" x="0" y="60">Interactive Layer</text>
    <line x1="0" y1="80" x2="120" y2="80" class="rule-thick" />

    <g transform="translate(0, 130)">
      <text class="stack-name ink" x="0" y="0">P5.js</text>
      <text class="stack-role muted" x="0" y="30">Powers the Pattern Generator</text>
      <text class="stack-role muted" x="0" y="50">and the Rosette Generator.</text>
    </g>

    <g transform="translate(0, 250)">
      <text class="stack-name ink" x="0" y="0">SVG.js</text>
      <text class="stack-role muted" x="0" y="30">Lightweight SVG manipulation</text>
      <text class="stack-role muted" x="0" y="50">for the step-by-step tutorial</text>
      <text class="stack-role muted" x="0" y="70">animations.</text>
    </g>

    <g transform="translate(0, 400)">
      <text class="stack-name ink" x="0" y="0">GSAP</text>
      <text class="stack-role muted" x="0" y="30">Homepage scroll animations</text>
      <text class="stack-role muted" x="0" y="50">and the rotating motif.</text>
    </g>

    <g transform="translate(0, 520)">
      <text class="stack-name ink" x="0" y="0">Driver.js</text>
      <text class="stack-role muted" x="0" y="30">Step-locked onboarding tour</text>
      <text class="stack-role muted" x="0" y="50">for the Pattern Generator</text>
      <text class="stack-role muted" x="0" y="70">and user profile.</text>
    </g>
  </g>

  <!-- Hankin's Algorithm callout -->
  <g transform="translate(80, 880)">
    <rect width="1440" height="140" fill="#0A0A0A" />
    <rect x="0" y="0" width="8" height="140" class="accent" />
    <text class="subtitle accent" x="40" y="50">Algorithmic core</text>
    <text class="stack-name" x="40" y="98" fill="#f9f9f7">Hankin's algorithm</text>
    <text class="stack-role" x="500" y="92" fill="rgba(249,249,247,0.7)">A geometric construction method for Islamic patterns —</text>
    <text class="stack-role" x="500" y="115" fill="rgba(249,249,247,0.7)">connecting midpoints of polygon edges at consistent angles.</text>
  </g>
</svg>
